<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MediTrack — Patient System</title>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: #e2e8f0;
    }

    /* NAVBAR */
    header {
      backdrop-filter: blur(10px);
      background: rgba(15, 23, 42, 0.6);
      border-bottom: 1px solid rgba(255,255,255,0.05);
      padding: 1.5rem;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    header h1 {
      font-size: 2.2rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      background: linear-gradient(90deg, #38bdf8, #6366f1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    header p {
      opacity: 0.6;
      font-size: 0.9rem;
      margin-top: 4px;
    }

    .container {
      max-width: 1200px;
      margin: 2rem auto;
      padding: 0 1.5rem;
    }

    /* STATS */
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 1.2rem;
      margin-bottom: 2rem;
    }

    .stat {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.05);
      backdrop-filter: blur(12px);
      border-radius: 16px;
      padding: 1.5rem;
      transition: 0.3s ease;
    }

    .stat:hover {
      transform: translateY(-4px);
      border-color: rgba(99,102,241,0.4);
    }

    .number {
      font-size: 2.2rem;
      font-weight: 700;
      color: #38bdf8;
    }

    .label {
      font-size: 0.85rem;
      opacity: 0.6;
      margin-top: 5px;
    }

    /* CARDS */
    .card {
      background: rgba(255,255,255,0.03);
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.05);
      padding: 1.5rem;
      margin-bottom: 1.8rem;
      backdrop-filter: blur(12px);
    }

    .card h2 {
      font-size: 1.2rem;
      margin-bottom: 1rem;
      color: #38bdf8;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      padding-bottom: 0.5rem;
    }

    /* TABLE */
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }

    th {
      text-align: left;
      padding: 0.8rem;
      font-weight: 600;
      color: #94a3b8;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    td {
      padding: 0.8rem;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    tr:hover {
      background: rgba(255,255,255,0.03);
    }

    /* BADGES */
    .badge {
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 600;
    }

    .badge-scheduled {
      background: rgba(59,130,246,0.2);
      color: #60a5fa;
    }

    .badge-confirmed {
      background: rgba(34,197,94,0.2);
      color: #4ade80;
    }

    .badge-cancelled {
      background: rgba(239,68,68,0.2);
      color: #f87171;
    }

    footer {
      text-align: center;
      padding: 2rem;
      font-size: 0.8rem;
      opacity: 0.4;
    }
  </style>
</head>

<body>

<header>
  <h1>Theo MediTrack 4.0</h1>
  <p>Healthcare Intelligence Dashboard</p>
</header>

<div class="container">

  <div class="stats">
    <div class="stat"><div class="number" id="patientCount">-</div><div class="label">Patients</div></div>
    <div class="stat"><div class="number" id="apptCount">-</div><div class="label">Appointments</div></div>
    <div class="stat"><div class="number" id="todayCount">-</div><div class="label">Today</div></div>
    <div class="stat"><div class="number" id="serverHost">-</div><div class="label">Server</div></div>
  </div>

  <div class="card">
    <h2>Appointments</h2>
    <table>
      <thead>
        <tr>
          <th>Patient</th>
          <th>Provider</th>
          <th>Dept</th>
          <th>Date</th>
          <th>Time</th>
          <th>Type</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody id="apptTable">
        <tr><td colspan="7">Loading...</td></tr>
      </tbody>
    </table>
  </div>

  <div class="card">
    <h2>Patients</h2>
    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>DOB</th>
          <th>Email</th>
          <th>Phone</th>
          <th>Insurance</th>
        </tr>
      </thead>
      <tbody id="patientTable">
        <tr><td colspan="5">Loading...</td></tr>
      </tbody>
    </table>
  </div>

</div>

<footer>
  MediTrack — Intelligent Healthcare Platform
</footer>

<script>
  async function load() {
    try {
      const [pRes, aRes, hRes] = await Promise.all([
        fetch('/api/patients'),
        fetch('/api/appointments'),
        fetch('/health'),
      ]);

      const patients = await pRes.json();
      const appts = await aRes.json();
      const health = await hRes.json();

      const today = new Date().toISOString().split('T')[0];

      document.getElementById('patientCount').textContent = patients.count;
      document.getElementById('apptCount').textContent = appts.count;
      document.getElementById('todayCount').textContent =
        appts.appointments.filter(a => a.date === today).length;
      document.getElementById('serverHost').textContent = health.version;

      document.getElementById('apptTable').innerHTML =
        appts.appointments.map(a => `
          <tr>
            <td>${a.patientName}</td>
            <td>${a.provider}</td>
            <td>${a.department}</td>
            <td>${a.date}</td>
            <td>${a.time}</td>
            <td>${a.type}</td>
            <td><span class="badge badge-${a.status}">${a.status}</span></td>
          </tr>`).join('');

      document.getElementById('patientTable').innerHTML =
        patients.patients.map(p => `
          <tr>
            <td>${p.firstName} ${p.lastName}</td>
            <td>${p.dob}</td>
            <td>${p.email || '—'}</td>
            <td>${p.phone || '—'}</td>
            <td>${p.insuranceId || '—'}</td>
          </tr>`).join('');

    } catch (err) {
      console.error(err);
    }
  }

  load();
</script>

</body>
</html>
